services:
  db:
    image: postgres:16-alpine
    container_name: ro-database-pg
    environment:
      POSTGRES_USER: rodb
      POSTGRES_PASSWORD: rodb
      POSTGRES_DB: rodb
    ports:
      - "5432:5432"
    volumes:
      - ro_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rodb -d rodb"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ro_pgdata:
